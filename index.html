<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Будильник - Головна</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-alarm"></i> WebAlarm</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Мої будильники</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1">
        <div class="alert alert-warning alert-dismissible fade show" role="alert">
            <h4 class="alert-heading"><i class="bi bi-bell-fill"></i> Час вийшов!</h4>
            <p>Спрацював ваш будильник, встановлений на <strong>07:00</strong>.</p>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Новий будильник</h5>
                    </div>
                    <div class="card-body">
                        <form>
                            <div class="mb-3">
                                <label for="alarmTime" class="form-label">Час</label>
                                <input type="time" class="form-control" id="alarmTime" value="08:00">
                            </div>
                            <div class="mb-3">
                                <label for="alarmDate" class="form-label">Дата (опціонально)</label>
                                <input type="date" class="form-control" id="alarmDate">
                            </div>
                            <div class="mb-3">
                                <label for="alarmLabel" class="form-label">Назва/Нотатка</label>
                                <input type="text" class="form-control" id="alarmLabel" placeholder="Наприклад: Навчання">
                            </div>
                            <button type="button" class="btn btn-primary w-100">Додати</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <h4 class="mb-3">Заведені будильники</h4>
                <div class="list-group shadow-sm">
                    <div class="list-group-item d-flex justify-content-between align-items-center p-3">
                        <div>
                            <h2 class="mb-0">07:00</h2>
                            <small class="text-muted">Щодня | Ранкова пробіжка</small>
                        </div>
                        <div class="form-check form-switch fs-4">
                            <input class="form-check-input" type="checkbox" role="switch" checked>
                        </div>
                    </div>
                    <div class="list-group-item d-flex justify-content-between align-items-center p-3">
                        <div>
                            <h2 class="mb-0 text-muted">14:30</h2>
                            <small class="text-muted">25 жовтня 2026 | Зустріч</small>
                        </div>
                        <div class="form-check form-switch fs-4">
                            <input class="form-check-input" type="checkbox" role="switch">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 WebAlarm. Всі права захищено.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
