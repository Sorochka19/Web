<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід - WebAlarm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

    <div id="app" class="d-flex flex-column min-vh-100">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="index.html"><i class="bi bi-alarm"></i> WebAlarm</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <template v-if="currentUser">
                            <li class="nav-item"><a class="nav-link" href="index.html">Мої будильники</a></li>
                            <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                        </template>
                        <template v-else>
                            <li class="nav-item"><a class="nav-link active" href="login.html">Вхід</a></li>
                            <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                        </template>
                        <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center">
            <div class="card shadow-sm w-100" style="max-width: 400px;">
                <div class="card-body p-4">
                    <h3 class="text-center mb-4">Вхід</h3>
                    <form @submit.prevent="login">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" v-model="loginForm.email" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Пароль</label>
                            <input type="password" class="form-control" v-model="loginForm.password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Увійти</button>
                    </form>
                </div>
            </div>
        </main>

        <footer class="bg-dark text-white text-center py-3 mt-auto">
            <div class="container"><p class="mb-0">&copy; 2026 WebAlarm. Всі права захищено.</p></div>
        </footer>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
