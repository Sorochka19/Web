<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація - WebAlarm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-alarm"></i> WebAlarm</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" id="nav-alarms"><a class="nav-link" href="index.html">Мої будильники</a></li>
                    <li class="nav-item" id="nav-profile"><a class="nav-link" href="profile.html">Профіль</a></li>
                    <li class="nav-item" id="nav-login"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item" id="nav-register"><a class="nav-link active" href="register.html">Реєстрація</a></li>
                    <li class="nav-item" id="nav-about"><a class="nav-link" href="about.html">Про додаток</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="card shadow-sm w-100" style="max-width: 500px;">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Реєстрація</h3>
                <form id="regForm">
                    <div class="mb-3">
                        <label for="regName" class="form-label">Ім'я</label>
                        <input type="text" class="form-control" id="regName" placeholder="Введіть ваше ім'я" required>
                    </div>
                    <div class="mb-3">
                        <label for="regEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="regEmail" placeholder="name@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="regPassword" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="regPassword" placeholder="Створіть пароль" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label d-block">Стать</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="genderMale" value="male" required>
                            <label class="form-check-label" for="genderMale">Чоловіча</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="female" required>
                            <label class="form-check-label" for="genderFemale">Жіноча</label>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="regDob" class="form-label">Дата народження</label>
                        <input type="date" class="form-control" id="regDob" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Зареєструватися</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container"><p class="mb-0">&copy; 2026 WebAlarm. Всі права захищено.</p></div>
    </footer>
    
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
